name: Android Build & Release

on:
  push:
    branches: [ master]
  pull_request:
    branches: [ master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Repo ke andar settings.gradle dhoond kar Gradle project ka root pata karta hai.
      # Isse fark nahi padta ki project root me hai ya kisi subfolder (jaise android-gps-copy) me.
      - name: Locate Gradle project
        id: findroot
        run: |
          FILE=$(find . \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) | head -n 1)
          if [ -z "$FILE" ]; then
            echo "settings.gradle nahi mili!"
            find . -maxdepth 3 -type f -name '*.gradle*'
            exit 1
          fi
          DIR=$(dirname "$FILE")
          echo "Gradle project root: $DIR"
          echo "project_dir=$DIR" >> "$GITHUB_OUTPUT"

      # gradle-wrapper.jar git me commit nahi hota, isliye yahan download karte hai.
      - name: Setup Gradle Wrapper
        working-directory: ${{ steps.findroot.outputs.project_dir }}
        run: |
          mkdir -p gradle/wrapper
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
              "https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar"
          fi
          if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
            cat > gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          fi

      - name: Create gradlew script
        working-directory: ${{ steps.findroot.outputs.project_dir }}
        run: |
          if [ ! -f gradlew ]; then
            cat > gradlew <<'EOF'
          #!/bin/sh
          DIRNAME=$(dirname "$0")
          CLASSPATH=$DIRNAME/gradle/wrapper/gradle-wrapper.jar
          exec java -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          fi
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: ${{ steps.findroot.outputs.project_dir }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ steps.findroot.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
